version: '3.8'

services:

  # ─── PHP-FPM (Symfony App) ───────────────────────────────────────────────
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: venus_php
    volumes:
      - .:/var/www/html
      - uploads_data:/var/www/html/public/uploads
    environment:
      APP_ENV: dev
      APP_SECRET: ${APP_SECRET:-s3cr3t_venus_2024_tfg_local}
      DATABASE_URL: mysql://app:app@database:3306/peluqueria_venus?serverVersion=8.0&charset=utf8mb4
      MAILER_DSN: smtp://mailer:1025
    depends_on:
      database:
        condition: service_healthy
    networks:
      - venus_network

  # ─── NGINX (Servidor Web) ────────────────────────────────────────────────
  webserver:
    image: nginx:1.25-alpine
    container_name: venus_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - uploads_data:/var/www/html/public/uploads:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - venus_network

  # ─── MYSQL (Base de Datos) ───────────────────────────────────────────────
  database:
    image: mysql:8.0
    container_name: venus_db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: peluqueria_venus
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - database_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "app", "-papp"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - venus_network

  # ─── MAILHOG (Servidor de correo para dev) ───────────────────────────────
  mailer:
    image: mailhog/mailhog
    container_name: venus_mailer
    ports:
      - "1025:1025"   # Puerto SMTP
      - "8025:8025"   # Interfaz Web → http://localhost:8025
    networks:
      - venus_network

# ─── PHPMYADMIN (Interfaz de gestión de MySQL) ─────────────────────────
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: venus_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: database
      PMA_USER: app
      PMA_PASSWORD: app
    depends_on:
      - database
    networks:
      - venus_network

volumes:
  database_data:
  uploads_data:

networks:
  venus_network:
    driver: bridge